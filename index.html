<script>
function send() {
    let text = document.getElementById("input").value;
    let chat = document.getElementById("chat");

    chat.innerHTML += "<p>You: " + text + "</p>";

    let reply = getAI(text);

    chat.innerHTML += "<p>Bot: " + reply + "</p>";

    document.getElementById("input").value = "";
}

function getAI(text) {
    text = text.toLowerCase();

    // Simple “AI-like” understanding
    if (text.includes("hello") || text.includes("hi")) {
        return "Hello 👋 I am Task0.1 AI";
    }

    if (text.includes("name")) {
        return "My name is Task0.1 AI Bot 🤖";
    }

    if (text.includes("how are you")) {
        return "I am running inside your browser and learning!";
    }

    if (text.includes("what can you do")) {
        return "I can chat with you and improve step by step 🚀";
    }

    if (text.includes("joke")) {
        return "Why did the computer get cold? Because it left its WiWindowspen 😄";
    }

    return "Hmm 🤔 I am still learning this response...";
}
</script>
